version: "3.8"

services:
  db_postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: Rallyhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MyStrongPassword123@
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Rallyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache_redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_backend:
    build:
      context: ./backend/Rallyhub
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db_postgres;Database=Rallyhub;Username=postgres;Password=MyStrongPassword123@
      - ConnectionStrings__Redis=cache_redis:6379
    depends_on:
      db_postgres:
        condition: service_healthy
      cache_redis:
        condition: service_healthy

volumes:
  pgdata:
