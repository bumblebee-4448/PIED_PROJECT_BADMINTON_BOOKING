<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RallyHub - Đặt sân cầu lông trực tuyến hàng đầu Việt Nam</title>
    <meta name="description" content="RallyHub là nền tảng đặt sân cầu lông trực tuyến uy tín, giúp bạn tìm kiếm và đặt sân nhanh chóng trong vài giây. Khám phá hơn 500+ sân cầu lông trên toàn quốc." />
    <meta name="keywords" content="đặt sân cầu lông, sân cầu lông gần đây, tìm sân cầu lông, cầu lông việt nam, rallyhub" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rallyhub.id.vn/" />
    <meta property="og:title" content="RallyHub - Đặt sân cầu lông trực tuyến hàng đầu Việt Nam" />
    <meta property="og:description" content="Tìm kiếm và đặt sân cầu lông nhanh chóng. Tiết kiệm thời gian, trải nghiệm chuyên nghiệp." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="RallyHub - Đặt sân cầu lông trực tuyến" />
    <meta property="twitter:description" content="Nền tảng đặt sân cầu lông hàng đầu." />
    
    <script>
      try {
        const stored = localStorage.getItem("theme-storage");
        if (stored) {
          const { state } = JSON.parse(stored);
          if (state?.theme === "dark") {
            document.documentElement.style.colorScheme = "dark";
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
